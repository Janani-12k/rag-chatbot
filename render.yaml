services:
  - type: web
    name: rag-chatbot-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && apt-get update && apt-get install -y google-chrome-stable
    startCommand: gunicorn --chdir backend -w 1 -k uvicorn.workers.UvicornWorker app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
